<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>現在の星空</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
  
    <style>
     

    </style>
  </head>
  <body>
   <h3 id="tk">【14:08】現在の星空</h3>
   <script>
const now = new Date();

const h = now.getHours();      // 時
const m = now.getMinutes();    // 分
const s = now.getSeconds();    // 秒

document.getElementById("tk").textContent = `【${h}:${m}:${s}】現在の星空`;
</script>
  </body>
</html>
